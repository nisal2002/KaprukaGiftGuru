<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapruka Gift Guru</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container">
        <header id="chat-header">
            <div class="header-info">
                <h1>Kapruka Gift Guru 🎁</h1>
                <p>Your personalized Sri Lankan shopping assistant</p>
            </div>
        </header>
        
        <div id="chat-box">
            <div class="message assistant">
                Hello! I am your Kapruka Gift Guru. Ask me to find products, check delivery availability or build an order for you!
            </div>
        </div>
        
        <div id="loading-indicator" class="hidden">
            <span>Guru is analyzing Kapruka...</span>
            <div class="spinner"></div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your gift request here (e.g., Chocolate cake under 7000 LKR)..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
