<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapruka Gift Guru</title>
    
    <!-- Import Plus Jakarta Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col">

    <!-- Top Navigation Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">Kapruka <span class="text-emerald-600">Gift Guru</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <!-- Dynamic Model Selector Engine -->
            <div class="flex items-center space-x-2 bg-slate-100 pl-3 pr-1 py-1 rounded-xl border border-slate-200 select-none">
                <label for="model-engine" class="text-[10px] font-bold text-slate-500 tracking-wide uppercase">
                    Engine:
                </label>
                <select id="model-engine" class="bg-transparent text-sm font-semibold text-slate-700 outline-none border-0 cursor-pointer py-0.5 pl-1 pr-6 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23334155%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:10px_auto] bg-[right_4px_center] bg-no-repeat">
                    <option value="openai" selected>🤖 OpenAI (Cloud)</option>
                    <option value="ollama">🏠 Ollama (Local)</option>
                </select>
            </div>

            <!-- Synchronized Mini Cart Indicator -->
            <div id="cart-status" class="flex items-center bg-slate-100 px-3 py-1.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 select-none">
                🛒 Cart: 0 items
            </div>
        </div>
    </header>

    <!-- Main Live Chat Window -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 max-w-4xl w-full mx-auto">
        
        <!-- Example System Greeting Message -->
        <div class="flex items-start space-x-3 max-w-[80%]">
            <div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold text-sm shrink-0">
                GG
            </div>
            <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 shadow-xs">
                <p class="text-sm leading-relaxed">Aubowan! 🇱🇰 I'm your Kapruka Gift Guru. Looking to send something special to family or friends back home? Tell me who it's for, or just type in Tanglish!</p>
            </div>
        </div>

    </main>

    <!-- Bottom Input Dock -->
    <footer class="bg-white border-t border-slate-200 p-4 shrink-0">
        <div class="max-w-4xl w-full mx-auto">
            <form id="chat-form" class="flex items-center space-x-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Ask for gift suggestions, cakes, hampers... (e.g., 'Mchn, cake choices monada?')" 
                    class="flex-1 bg-slate-100 border-0 focus:ring-2 focus:ring-emerald-500 rounded-xl px-4 py-3 text-sm placeholder-slate-400 focus:outline-none transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-3 rounded-xl shadow-sm transition-colors cursor-pointer shrink-0"
                >
                    Send
                </button>
            </form>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
