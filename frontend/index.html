<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapruka Gift Guru</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <!-- Top Navigation Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">Kapruka <span class="text-emerald-600">Gift Guru</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <!-- Mini Cart Indicator -->
            <div id="cart-status" class="text-sm bg-slate-100 text-slate-700 px-3 py-1.5 rounded-full font-medium">
                🛒 Cart: 0 items
            </div>
        </div>
    </header>

    <!-- Main Live Chat Window -->
    <main id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 max-w-4xl w-full mx-auto">
        
        <!-- Example System Greeting Message -->
        <div class="flex items-start space-x-3 max-w-[80%]">
            <div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold text-sm shrink-0">
                GG
            </div>
            <div class="bg-white p-4 rounded-2xl rounded-tl-none border border-slate-100 shadow-xs">
                <p class="text-sm leading-relaxed">Aubowan! 🇱🇰 I'm your Kapruka Gift Guru. Looking to send something special to family or friends back home? Tell me who it's for, or just type in Tanglish!</p>
            </div>
        </div>

    </main>

    <!-- Bottom Input Dock -->
    <footer class="bg-white border-t border-slate-200 p-4 shrink-0">
        <div class="max-w-4xl w-full mx-auto">
            <form id="chat-form" class="flex items-center space-x-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Ask for gift suggestions, cakes, hampers... (e.g., 'Mchn, cake choices monada?')" 
                    class="flex-1 bg-slate-100 border-0 focus:ring-2 focus:ring-emerald-500 rounded-xl px-4 py-3 text-sm placeholder-slate-400 focus:outline-none transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium text-sm px-5 py-3 rounded-xl shadow-sm transition-colors cursor-pointer shrink-0"
                >
                    Send
                </button>
            </form>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
